<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0099A8"/>
      <stop offset="100%" stop-color="#00B4C5"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="white" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="800" height="480" rx="16" fill="url(#bg)"/>
  <rect width="800" height="480" rx="16" fill="url(#grid)"/>
  <rect width="800" height="480" rx="16" fill="url(#dots)"/>
  <circle cx="120" cy="100" r="60" fill="none" stroke="white" stroke-width="1" opacity="0.04"/>
  <circle cx="120" cy="100" r="40" fill="none" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <circle cx="680" cy="380" r="80" fill="none" stroke="white" stroke-width="1" opacity="0.04"/>
  <circle cx="680" cy="380" r="50" fill="none" stroke="white" stroke-width="0.5" opacity="0.03"/>

  <!-- Case Management Icon: Connected people network -->
  <g transform="translate(400, 240)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Connection lines (behind nodes) -->
    <line x1="0" y1="-20" x2="-65" y2="-65" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="-20" x2="65" y2="-65" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="-20" x2="-80" y2="30" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="-20" x2="80" y2="30" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="-20" x2="-40" y2="75" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="-20" x2="40" y2="75" stroke-width="2" opacity="0.3"/>
    
    <!-- Outer connections between peripheral nodes -->
    <path d="M-65,-65 Q-85,-15 -80,30" stroke-width="1.5" opacity="0.15"/>
    <path d="M65,-65 Q85,-15 80,30" stroke-width="1.5" opacity="0.15"/>
    <path d="M-80,30 Q-60,65 -40,75" stroke-width="1.5" opacity="0.15"/>
    <path d="M80,30 Q60,65 40,75" stroke-width="1.5" opacity="0.15"/>
    
    <!-- Central person (Case Manager) - larger -->
    <circle cx="0" cy="-35" r="14" stroke-width="2.5" opacity="0.9"/>
    <path d="M-22,-8 Q-22,12 0,16 Q22,12 22,-8" stroke-width="2.5" opacity="0.9"/>
    
    <!-- Clipboard behind central person -->
    <rect x="-10" y="-5" width="20" height="28" rx="2" stroke-width="1.5" opacity="0.25" fill="white" fill-opacity="0.05"/>
    <line x1="-5" y1="5" x2="5" y2="5" stroke-width="1.5" opacity="0.2"/>
    <line x1="-5" y1="11" x2="5" y2="11" stroke-width="1.5" opacity="0.2"/>
    <line x1="-5" y1="17" x2="3" y2="17" stroke-width="1.5" opacity="0.2"/>
    
    <!-- Top-left person -->
    <circle cx="-65" cy="-78" r="10" stroke-width="2" opacity="0.7"/>
    <path d="M-80,-60 Q-80,-48 -65,-45 Q-50,-48 -50,-60" stroke-width="2" opacity="0.7"/>
    
    <!-- Top-right person -->
    <circle cx="65" cy="-78" r="10" stroke-width="2" opacity="0.7"/>
    <path d="M50,-60 Q50,-48 65,-45 Q80,-48 80,-60" stroke-width="2" opacity="0.7"/>
    
    <!-- Mid-left person -->
    <circle cx="-80" cy="17" r="10" stroke-width="2" opacity="0.7"/>
    <path d="M-95,35 Q-95,47 -80,50 Q-65,47 -65,35" stroke-width="2" opacity="0.7"/>
    
    <!-- Mid-right person -->
    <circle cx="80" cy="17" r="10" stroke-width="2" opacity="0.7"/>
    <path d="M65,35 Q65,47 80,50 Q95,47 95,35" stroke-width="2" opacity="0.7"/>
    
    <!-- Bottom-left person -->
    <circle cx="-40" cy="62" r="10" stroke-width="2" opacity="0.7"/>
    <path d="M-55,80 Q-55,92 -40,95 Q-25,92 -25,80" stroke-width="2" opacity="0.7"/>
    
    <!-- Bottom-right person -->
    <circle cx="40" cy="62" r="10" stroke-width="2" opacity="0.7"/>
    <path d="M25,80 Q25,92 40,95 Q55,92 55,80" stroke-width="2" opacity="0.7"/>
    
    <!-- Subtle pulse rings around central figure -->
    <circle cx="0" cy="-15" r="45" stroke-width="1" opacity="0.1"/>
    <circle cx="0" cy="-15" r="65" stroke-width="0.8" opacity="0.06"/>
    
    <!-- Small accent dots on connection lines -->
    <circle cx="-32" cy="-42" r="2" fill="white" opacity="0.35"/>
    <circle cx="32" cy="-42" r="2" fill="white" opacity="0.35"/>
    <circle cx="-40" cy="5" r="2" fill="white" opacity="0.3"/>
    <circle cx="40" cy="5" r="2" fill="white" opacity="0.3"/>
    <circle cx="-20" cy="28" r="2" fill="white" opacity="0.25"/>
    <circle cx="20" cy="28" r="2" fill="white" opacity="0.25"/>
  </g>
</svg>
